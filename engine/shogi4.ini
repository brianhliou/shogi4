# Shogi4 — Oca Studios' public-domain 4x4 animal drop-shogi.
# Fairy-Stockfish variant config. REQUIRES the friendlyJump patch (this repo's
# engine/Fairy-Stockfish fork; see engine/PATCH-shogi4.md). Ruleset recovered from
# the official app — see ../research/prior-art-evidence/ and ../research/findings.md.
#
# Load with:  setoption name VariantPath value <abs path>/shogi4.ini
#             setoption name UCI_Variant value shogi4
#
# Pieces (UPPER = White = Player 1 / moves up the board; lower = Black = Player 2):
#   K  commoner   K       king (Crane / Pheasant). Won by CAPTURE, not check.
#   P  carp       fW      forward step (shogi pawn)              -> promotes O (koi)
#   T  tapir      fWfF    forward + forward-diagonals            -> promotes B (baku)
#   R  raccoon    F       Ferz (four diagonals)                 -> promotes N (tanuki)
#   F  fox        W       Wazir (four orthogonals)              -> promotes G (kitsune)
# Promoted movers (stored as these types; shown in FEN as +P/+T/+R/+F):
#   silver  FfW  (forward + four diagonals)  = koi / baku / tanuki
#   gold    WfF  (orthogonals + forward-diag) = kitsune
#
# The Shogi4 friendly-jump: in any direction a piece already steps, if an adjacent
# square holds a FRIENDLY piece, it may leap to the square two steps out (capture
# allowed on landing; no enemy hops; no chaining). Implemented by the friendlyJump
# patch. No check rule: moving your king into capture range is legal; you lose only
# when it is actually captured (extinction, NOT pseudo-royal).

[shogi4]
maxRank = 4
maxFile = 4

# --- pieces ---
commoner = k
customPiece1 = p:fW
customPiece2 = t:fWfF
customPiece3 = r:F
customPiece4 = f:W
silver = s
gold = g

startFen = trfk/3p/P3/KFRT[-] w 0 1

# --- the defining Shogi4 rule ---
friendlyJump = true

# --- promotion: mandatory, only on reaching the far rank ---
promotionRegionWhite = *4
promotionRegionBlack = *1
mandatoryPiecePromotion = true
promotedPieceType = p:s t:s r:s f:g

# --- drops: empty squares only, banned on the opponent's last rank (sole restriction) ---
pieceDrops = true
capturesToHand = true
dropRegionWhite = *1 *2 *3
dropRegionBlack = *2 *3 *4

# --- win condition: capture the king ---
extinctionValue = loss
extinctionPieceTypes = k
extinctionPseudoRoyal = false
stalemateValue = loss

# --- no chess baggage ---
castling = false
doubleStep = false
